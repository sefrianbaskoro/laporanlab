<!DOCTYPE html>
<html>
<head>
    <title>Form Laporan Lab Tepung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        h2 { text-align: center; color: #007bff; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; font-family: Arial, sans-serif; }
        input:focus, select:focus, textarea:focus { border-color: #007bff; outline: none; }
        
        /* Gaya Tombol */
        .btn-salin { background-color: #007bff; color: white; padding: 12px 15px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .btn-salin:hover { background-color: #0056b3; }
        
        .btn-wa { display: none; text-align: center; text-decoration: none; background-color: #25D366; color: white; padding: 12px 15px; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-wa:hover { background-color: #128C7E; }
        
        .alert-success { display: none; background-color: #d4edda; color: #155724; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🧪 Input Hasil Uji Lab</h2>
    
    <div id="notif" class="alert-success">📋 Teks laporan BERHASIL DISALIN!<br>Silakan klik tombol hijau di bawah untuk buka grup WA.</div>

    <div class="form-group">
        <label>Jenis Produk:</label>
        <select id="produk">
            <option value="">-- Pilih Produk --</option>
            <option value="Salt">Salt</option>
            <option value="CB-W0371C">CB-W0371C</option>
            <option value="TS40013-2 2260706">TS40013-2 2260706</option>
        </select>
    </div>

    <div class="form-group">
        <label>Tahapan Proses:</label>
        <select id="proses">
            <option value="">-- Pilih Tahapan --</option>
            <option value="Awal">Awal</option>
            <option value="Tengah">Tengah</option>
            <option value="Akhir">Akhir</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Jenis Pengujian:</label>
        <select id="uji">
            <option value="">-- Pilih Parameter Uji --</option>
            <option value="PH">PH</option>
            <option value="Texture">Texture</option>
            <option value="Moisture">Moisture</option>
            <option value="Color">Color</option>
            <option value="Sisa Ayak">Sisa Ayak</option>
        </select>
    </div>

    <div class="form-group">
        <label>Nilai Pengujian (Angka/Detail):</label>
        <input type="text" id="nilai_uji" placeholder="Contoh: 6.5 / 12.5% / Halus">
    </div>

    <div class="form-group">
        <label>Hasil Pengujian (Kesimpulan):</label>
        <textarea id="hasil_uji" rows="2" placeholder="Contoh: Memenuhi standar mutu produksi."></textarea>
    </div>

    <div class="form-group">
        <label>Status Akhir:</label>
        <select id="status">
            <option value="PASSED ✅">PASSED</option>
            <option value="REJECT ❌">REJECT</option>
        </select>
    </div>

    <button class="btn-salin" onclick="prosesLaporan()">1. Proses & Salin Teks</button>

    <a id="tombolWA" class="btn-wa" href="https://chat.whatsapp.com/KJLwVEjkfq0KL8EJ7YWN4o">2. Buka Grup WhatsApp</a>

    <script>
        function prosesLaporan() {
            var produk = document.getElementById('produk').value;
            var proses = document.getElementById('proses').value;
            var uji = document.getElementById('uji').value;
            var nilai_uji = document.getElementById('nilai_uji').value;
            var hasil_uji = document.getElementById('hasil_uji').value;
            var status = document.getElementById('status').value;

            // Validasi agar pilihan dropdown dan input tidak kosong
            if (!produk || !proses || !uji || !nilai_uji || !hasil_uji) {
                alert("Mohon lengkapi semua pilihan dan data laporan terlebih dahulu!");
                return;
            }

            // Format teks laporan otomatis (Lebih lengkap dan detail)
            var teks = "*🧪 LAPORAN HASIL UJI LABORATORIUM*\n" +
                       "-----------------------------------------\n" +
                       "🌾 *Jenis Produk :* " + produk + "\n" +
                       "🔄 *Tahapan Proses:* " + proses + "\n" +
                       "📊 *Jenis Uji     :* " + uji + "\n" +
                       "🔢 *Nilai Uji     :* " + nilai_uji + "\n" +
                       "📝 *Hasil/Catatan :* " + hasil_uji + "\n" +
                       "-----------------------------------------\n" +
                       "⚠️ *Status Akhir  :* *" + status + "*\n" +
                       "-----------------------------------------\n" +
                       "_(Foto bukti pengujian dilampirkan)_";

            // Mekanisme salin teks aman untuk mobile browser
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(teks);
            } else {
                var dummy = document.createElement("textarea");
                document.body.appendChild(dummy);
                dummy.value = teks;
                dummy.select();
                dummy.setSelectionRange(0, 99999);
                document.execCommand("copy");
                document.body.removeChild(dummy);
            }

            // Tampilkan notifikasi dan aktifkan tombol WA
            document.getElementById("notif").style.display = "block";
            document.getElementById("tombolWA").style.display = "block";
        }
    </script>

</body>
</html>
